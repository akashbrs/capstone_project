version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: pos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-restaurant_pos}
      MYSQL_USER: ${DB_USERNAME:-pos_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pos_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - pos-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-restaurant_pos}
      DB_USERNAME: ${DB_USERNAME:-pos_user}
      DB_PASSWORD: ${DB_PASSWORD:-pos_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-in-production-min-256-bits-long}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - pos-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: pos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - pos-network

networks:
  pos-network:
    driver: bridge

volumes:
  mysql_data:
