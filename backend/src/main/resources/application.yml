server:
  port: 8080

spring:
  application:
    name: restaurant-pos
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:restaurant_pos}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:pos_user}
    password: ${DB_PASSWORD:pos_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: true

pos:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-production-min-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.bsctf.pos: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
